syntax = "proto3";
package chrono;

enum EventType {
  SET    = 0;
  DELETE = 1;
  EXPIRE = 2;
}

message CacheEvent {
  EventType  type      = 1;
  bytes      key       = 2;
  bytes      value     = 3;   // populated for SET; empty for DELETE/EXPIRE
  int64      ttl_ms    = 4;   // 0 = no TTL; only meaningful for SET
  uint64     seq       = 5;   // per-key monotonic counter for idempotency
  int64      timestamp = 6;   // Unix ms — wall-clock time the mutation occurred
}